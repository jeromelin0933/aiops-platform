### 1.3.3 AlertManager Webhook 配置

```yaml
# config/alertmanager.yml

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 30m
  receiver: "aiops-backend"

receivers:
  - name: "aiops-backend"
    webhook_configs:
      - url: "http://host.docker.internal:8080/webhook/alert"
        send_resolved: true
        http_config:
          follow_redirects: true
```